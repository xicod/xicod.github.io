#cloud-config

merge_how:
  - name: list
    settings: [append]
  - name: dict
    settings: [no_replace, recurse_list]

packages:
  - build-essential

runcmd:
  - |
    #!/bin/bash

    set -e
    set -u
    set -x

    systemctl stop unattended-upgrades.service
    systemctl disable unattended-upgrades.service
    apt-get remove --purge -y -qq unattended-upgrades


